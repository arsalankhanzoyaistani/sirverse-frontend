# ==========================================
# 🚀 SirVerse GPT — Netlify Production Config
# ==========================================

[build]
  command = "npm run build"
  publish = "build"

# ✅ 404 Fix for React Router (single page app)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ==========================================
# ⚡️ Performance & Caching
# ==========================================

# HTML — don’t cache (always fetch fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "text/html; charset=UTF-8"

# Static assets — aggressively cache (1 year)
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — cache for 1 month
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# JSON, JS, CSS — cache for 1 week
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Gzip + Brotli compression (enabled by default)
# This section just documents behavior, no config needed.

# ==========================================
# 🔒 Security Headers
# ==========================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
